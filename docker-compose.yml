version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: sidainfo-updater-app
    container_name: sidainfo-updater-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - updater-network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: sidainfo-updater-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - updater-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: sidainfo-updater-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sidainfo_updater}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-updater}
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - updater-network

networks:
  updater-network:
    driver: bridge

volumes:
  dbdata:
