# =============================================================================
# SIDAInfo Update Server — Production Docker Compose
# =============================================================================
#
# SETUP:
#   1. Copy .env.production to .env and fill in all values:
#        cp .env.production .env
#   2. Generate an app key:
#        docker compose -f docker-compose.prod.yml run --rm app php artisan key:generate --show
#      Then set APP_KEY= in your .env
#   3. Build and start:
#        docker compose -f docker-compose.prod.yml up -d --build
#   4. Seed the admin user and sites (first deploy only):
#        docker compose -f docker-compose.prod.yml exec app php artisan db:seed --force
#
# UPDATE DEPLOYMENT:
#   docker compose -f docker-compose.prod.yml up -d --build
#   (Migrations run automatically on startup via entrypoint.sh)
#
# HOST NGINX:
#   - This stack does not run a second nginx container in production.
#   - Point the VPS nginx document root at this checkout's public/ directory.
#   - Proxy PHP requests to 127.0.0.1:${PHP_FPM_PORT:-9000}.
#
# DATA PERSISTENCE:
#   - MySQL data   → named volume `dbdata`
#   - Release ZIPs → named volume `releases_storage`
#   Both survive `docker compose down`. Use `docker compose down -v` only if
#   you intentionally want to wipe all data.
#
# BACKUP:
#   DB:       docker compose -f docker-compose.prod.yml exec db \
#               mysqldump -uroot -p${DB_ROOT_PASSWORD} sidainfo_updater > backup.sql
#   Releases: docker run --rm -v sidainfo-updater_releases_storage:/data \
#               -v $(pwd):/backup alpine tar czf /backup/releases-$(date +%Y%m%d).tar.gz -C /data .

services:

  # ---------------------------------------------------------------------------
  # PHP-FPM application — code baked into the image, exposed to host nginx
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: sidainfo-updater-app:latest
    container_name: sidainfo-updater-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${PHP_FPM_PORT:-9000}:9000"
    volumes:
      # Persistent data only — source code is baked into the image
      - releases_storage:/var/www/html/storage/app/releases
    networks:
      - updater-network
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # MySQL 8 — data in named volume, not exposed outside Docker network
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: sidainfo-updater-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - updater-network
    # DB port is intentionally NOT exposed to the host in production.
    # To connect from outside: docker compose exec db mysql -u...
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  updater-network:
    driver: bridge

volumes:
  dbdata:
    # MySQL data files — back up regularly (see BACKUP section above)
  releases_storage:
    # Uploaded release ZIP files — back up regularly
